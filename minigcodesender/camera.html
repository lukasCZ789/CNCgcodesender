<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Camera</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        height: 100%;
        width: 100%;
        margin: 0;
        background: #000;
        overflow: hidden;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI',
          sans-serif;
      }
      #video {
        width: 100%;
        height: 100%;
        object-fit: contain;
        transform-origin: center center;
        background: #000;
      }
      #hud {
        position: absolute;
        top: 12px;
        left: 12px;
        right: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        pointer-events: none;
        color: rgba(226, 232, 240, 0.9);
        font-size: 12px;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.8);
      }
      #status {
        opacity: 0.9;
      }
      #zoom {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <div id="status">Starting camera…</div>
      <div id="zoom"></div>
    </div>
    <video id="video" autoplay playsinline muted></video>
    <script src="camera.js"></script>
  </body>
</html>
